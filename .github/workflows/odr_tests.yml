name: ODR checks

on:
  push

jobs:
  odr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
          
      - name: Build ConsoleApp ODR
        run: |
          g++ -std=c++17 -c console_app_a.cpp
          g++ -std=c++17 -c console_app_b.cpp
          g++ -std=c++17 -c console_app_main.cpp
          g++ console_app_a.o console_app_b.o console_app_main.o -o app
          
      - name: Run ConsoleApp ODR
        run: ./app